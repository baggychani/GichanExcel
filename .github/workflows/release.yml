name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "릴리스 버전 (예: 1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installer (NSIS Setup)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "기찬엑셀 ${{ steps.release.outputs.tag }}"
          releaseBody: |
            ## 다운로드

            **Setup (설치형)** — `기찬엑셀_*_x64-setup.exe`

            Windows에 설치하고 xlsx / xls / csv 파일을 더블클릭으로 바로 열 수 있습니다.

            ### 설치 방법
            1. `기찬엑셀_*_x64-setup.exe` 를 다운로드합니다.
            2. 설치 마법사를 따라 진행합니다.
            3. 시작 메뉴에서 **기찬엑셀**을 실행합니다.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
